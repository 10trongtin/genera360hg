<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#171814">
  <meta name="description" content="Khám phá vị trí dự án Genera by The Solia qua sa bàn 360°.">
  <meta property="og:title" content="Sa bàn 360° | Genera by The Solia">
  <meta property="og:description" content="Khám phá vị trí và tiện ích dự án Genera by The Solia.">
  <meta property="og:image" content="https://ecoparkproperty.vn/wp-content/uploads/2026/07/genera.jpg">
  <title>Sa bàn 360° | Genera by The Solia</title>
  <style>
    :root {
      color-scheme: dark;
      --surface: #171814;
      --surface-high: #23241f;
      --surface-glass: rgba(23, 24, 20, 0.88);
      --primary: #d9bd82;
      --on-primary: #3a2f18;
      --on-surface: #f0f0e8;
      --on-surface-muted: #c7c7bc;
      --outline: rgba(240, 240, 232, 0.16);
      --shadow: 0 12px 36px rgba(0, 0, 0, 0.28);
      --radius-lg: 22px;
      --radius-pill: 999px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    * { box-sizing: border-box; }
    html, body, #pano { width: 100%; height: 100%; margin: 0; }
    body { overflow: hidden; color: var(--on-surface); background: var(--surface); -webkit-tap-highlight-color: transparent; }
    button, a { font: inherit; }
    #pano { position: fixed; inset: 0; background: #10110e; }
    .top-app-bar {
      position: fixed; z-index: 20; top: max(16px, env(safe-area-inset-top)); left: max(68px, calc(env(safe-area-inset-left) + 68px));
      display: flex; align-items: center; gap: 12px; min-height: 64px; max-width: min(460px, calc(100vw - 96px));
      padding: 10px 18px 10px 10px; border: 1px solid var(--outline); border-radius: var(--radius-lg);
      background: var(--surface-glass); box-shadow: var(--shadow); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); pointer-events: none;
      transition: opacity 220ms ease, transform 220ms ease;
    }
    body.menu-open .top-app-bar { opacity: 0; transform: translateY(-8px); }
    .brand-mark {
      display: grid; flex: 0 0 44px; width: 44px; height: 44px; place-items: center; border-radius: 15px;
      color: var(--on-primary); background: var(--primary); font-size: 13px; font-weight: 800; letter-spacing: -0.03em;
    }
    .brand-copy { min-width: 0; }
    .brand-kicker { margin: 0 0 2px; color: var(--primary); font-size: 11px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
    .brand-title { overflow: hidden; margin: 0; font-size: 16px; font-weight: 650; letter-spacing: -0.01em; line-height: 1.2; text-overflow: ellipsis; white-space: nowrap; }
    .contact-actions {
      position: fixed; z-index: 20; right: max(16px, env(safe-area-inset-right)); bottom: max(76px, calc(env(safe-area-inset-bottom) + 76px));
      display: flex; flex-direction: column; gap: 10px;
    }
    .action-button {
      display: flex; min-width: 56px; height: 56px; padding: 0 18px; align-items: center; gap: 10px; justify-content: center; border: 1px solid var(--outline);
      border-radius: 18px; color: var(--on-surface); background: var(--surface-glass); box-shadow: var(--shadow); text-decoration: none; touch-action: manipulation;
      transition: transform 180ms ease, background-color 180ms ease, color 180ms ease; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .action-button.primary { border-color: transparent; color: var(--on-primary); background: var(--primary); }
    .action-button:hover { transform: translateY(-2px); background: var(--surface-high); }
    .action-button.primary:hover { background: #e7cc91; }
    .action-button:active { transform: scale(0.96); }
    .action-button:focus-visible { outline: 3px solid rgba(217, 189, 130, 0.45); outline-offset: 3px; }
    .action-button svg { flex: 0 0 24px; width: 24px; height: 24px; fill: currentColor; }
    .action-label { font-size: 14px; font-weight: 700; letter-spacing: 0.01em; white-space: nowrap; }
    .helper-chip {
      position: fixed; z-index: 15; left: 50%; bottom: max(76px, calc(env(safe-area-inset-bottom) + 76px)); display: flex;
      align-items: center; gap: 8px; padding: 10px 16px; border: 1px solid var(--outline); border-radius: var(--radius-pill);
      color: var(--on-surface-muted); background: var(--surface-glass); box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
      font-size: 13px; font-weight: 550; pointer-events: none; transform: translateX(-50%);
      transition: opacity 400ms ease, transform 400ms ease; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }
    .helper-chip.is-hidden { opacity: 0; transform: translate(-50%, 8px); }
    .helper-chip svg { width: 18px; height: 18px; fill: var(--primary); }
    .loading-screen {
      position: fixed; z-index: 100; inset: 0; display: grid; place-items: center; background: var(--surface);
      transition: opacity 420ms ease, visibility 420ms ease;
    }
    .loading-screen.is-ready { opacity: 0; visibility: hidden; }
    .loader { display: grid; justify-items: center; gap: 18px; color: var(--on-surface-muted); font-size: 13px; letter-spacing: 0.04em; }
    .loader-ring { width: 42px; height: 42px; border: 3px solid rgba(217, 189, 130, 0.18); border-top-color: var(--primary); border-radius: 50%; animation: spin 850ms linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (max-width: 600px) {
      .top-app-bar { min-height: 58px; max-width: calc(100vw - 88px); padding: 8px 14px 8px 8px; }
      .brand-mark { width: 40px; height: 40px; border-radius: 13px; }
      .brand-title { font-size: 14px; }
      .brand-kicker { font-size: 10px; }
      .contact-actions { bottom: max(70px, calc(env(safe-area-inset-bottom) + 70px)); }
      .action-button { width: 52px; min-width: 52px; height: 52px; padding: 0; border-radius: 17px; }
      .action-label { display: none; }
      .top-app-bar, .action-button, .helper-chip { background: rgba(23, 24, 20, 0.96); backdrop-filter: none; -webkit-backdrop-filter: none; }
      .helper-chip { bottom: max(72px, calc(env(safe-area-inset-bottom) + 72px)); font-size: 12px; }
    }
    @media (max-height: 520px) and (orientation: landscape) {
      .top-app-bar { min-height: 48px; padding: 6px 12px 6px 6px; }
      .brand-mark { width: 36px; height: 36px; flex-basis: 36px; border-radius: 12px; }
      .brand-kicker, .helper-chip { display: none; }
      .contact-actions { bottom: max(64px, calc(env(safe-area-inset-bottom) + 64px)); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <main id="pano" aria-label="Sa bàn 360 độ dự án Genera">
    <noscript>Bạn cần bật JavaScript để xem sa bàn 360°.</noscript>
  </main>
  <header class="top-app-bar" aria-label="Thông tin dự án">
    <div class="brand-mark" aria-hidden="true">G360</div>
    <div class="brand-copy">
      <p class="brand-kicker">Genera by The Solia</p>
      <h1 class="brand-title">Khám phá dự án 360°</h1>
    </div>
  </header>
  <nav class="contact-actions" aria-label="Liên hệ tư vấn">
    <a class="action-button primary" href="tel:0938500588" aria-label="Gọi 0938 500 588">
      <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6.62 10.79a15.48 15.48 0 0 0 6.59 6.59l2.2-2.2a1 1 0 0 1 1.02-.24c1.12.37 2.33.57 3.57.57a1 1 0 0 1 1 1V20a1 1 0 0 1-1 1C10.61 21 3 13.39 3 4a1 1 0 0 1 1-1h3.5a1 1 0 0 1 1 1c0 1.25.2 2.45.57 3.57a1 1 0 0 1-.25 1.02l-2.2 2.2Z"/></svg>
      <span class="action-label">Gọi tư vấn</span>
    </a>
  </nav>
  <div class="helper-chip" id="helper" aria-hidden="true">
    <svg viewBox="0 0 24 24"><path d="M7 2a2 2 0 0 1 2 2v5h1V3a2 2 0 1 1 4 0v6h1V4a2 2 0 1 1 4 0v8.5l1.55-1.55a2 2 0 0 1 2.83 2.83l-5.8 5.8A5 5 0 0 1 14.05 21H10a7 7 0 0 1-7-7V7a2 2 0 1 1 4 0v5h1V4a2 2 0 0 1 2-2Z"/></svg>
    Chạm và kéo để khám phá
  </div>
  <div class="loading-screen" id="loading" role="status" aria-live="polite">
    <div class="loader"><div class="loader-ring" aria-hidden="true"></div><span>Đang mở không gian 360°</span></div>
  </div>
  <script src="tour.js"></script>
  <script>
    const loading = document.getElementById('loading');
    const helper = document.getElementById('helper');
    document.addEventListener('pointerdown', () => helper.classList.add('is-hidden'), { once: true, passive: true });
    const removeZaloLayers = () => document.querySelectorAll('a[href*="zalo.me"], [id*="zalo" i], [class*="zalo" i]').forEach((element) => element.remove());
    removeZaloLayers();
    new MutationObserver(removeZaloLayers).observe(document.body, { childList: true, subtree: true });
    embedpano({
      xml: 'tour.xml', target: 'pano', html5: 'only', mobilescale: 1,
      passQueryParameters: 'startscene,startlookat',
      onready() {
        window.setTimeout(() => loading.classList.add('is-ready'), 250);
        window.setTimeout(() => helper.classList.add('is-hidden'), 5500);
      }
    });
  </script>
</body>
</html>
